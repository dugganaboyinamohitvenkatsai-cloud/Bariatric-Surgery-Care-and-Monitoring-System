<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bariatric Surgery Care and Monitoring System - Login">
    <title>Bariatric Care System - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container" id="login-box">
        <h1>Bariatric Surgery Care</h1>
        <h2>Login</h2>

        <form onsubmit="event.preventDefault(); login();" novalidate>
            <input type="email" id="email" placeholder="Enter Email" required>
            <input type="text" id="username" placeholder="Enter Username" required minlength="3">

            <div class="password-field">
                <input type="password" id="password" placeholder="Enter Password" required minlength="4">
                <button type="button" class="toggle-password" onclick="togglePassword('password')">Show</button>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
        </form>

        <p id="error-msg"></p>
        <p class="auth-switch">Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign Up</a></p>
    </div>

    <div class="login-container" id="signup-box" style="display: none;">
        <h1>Bariatric Surgery Care</h1>
        <h2>Sign Up</h2>

        <form onsubmit="event.preventDefault(); signup();" novalidate>
            <input type="email" id="new-email" placeholder="Enter Email" required>
            <input type="text" id="new-username" placeholder="Choose Username" required minlength="3">

            <div class="password-field">
                <input type="password" id="new-password" placeholder="Choose Password" required minlength="4">
                <button type="button" class="toggle-password" onclick="togglePassword('new-password')">Show</button>
            </div>

            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <p id="signup-error-msg"></p>
        <p class="auth-switch">Already have an account? <a href="#" onclick="toggleAuthMode()">Login</a></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
