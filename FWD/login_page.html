<!DOCTYPE html>
<html>

<head>
    <title>Bariatric Care System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container" id="login-box">
        <h1>Bariatric Surgery Care and Monitoring System</h1>
        <h2>Login</h2>

        <input type="email" id="email" placeholder="Enter Email">
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Sign In</button>

        <p id="error-msg"></p>
        <p style="margin-top: 15px; font-size: 14px;">Don't have an account? <a href="#" onclick="toggleAuthMode()"
                style="color: #0f4c81; text-decoration: none; font-weight: bold;">Sign Up</a></p>
    </div>

    <div class="login-container" id="signup-box" style="display: none;">
        <h1>Bariatric Surgery Care and Monitoring System</h1>
        <h2>Sign Up</h2>

        <input type="email" id="new-email" placeholder="Enter Email">
        <input type="text" id="new-username" placeholder="Choose Username">
        <input type="password" id="new-password" placeholder="Choose Password">

        <button onclick="signup()">Sign Up</button>

        <p id="signup-error-msg"></p>
        <p style="margin-top: 15px; font-size: 14px;">Already have an account? <a href="#" onclick="toggleAuthMode()"
                style="color: #0f4c81; text-decoration: none; font-weight: bold;">Login</a></p>
    </div>

    <script src="script.js"></script>
</body>

</html>
